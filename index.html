<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homestay Hà Nội</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f5f7fb;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:40px 20px;
}

.card{
background:white;
padding:28px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

label{
font-weight:600;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0068ff;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#0053cc;
}

.info{
background:#f0f4ff;
padding:12px;
border-radius:8px;
margin-bottom:16px;
font-size:14px;
}

.error{
color:red;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🏡 Homestay Hà Nội</h1>
<p class="subtitle">Kiểm tra phòng trống nhanh</p>

<div id="error" class="error"></div>

<label>Tên của bạn</label>
<input id="name" placeholder="Ví dụ: Nguyễn Minh">

<label>Số điện thoại</label>
<input id="phone" placeholder="Ví dụ: 0912345678">

<label>Ngày check-in</label>
<input id="checkin" type="date" onchange="calculateNights()">

<label>Ngày check-out</label>
<input id="checkout" type="date" onchange="calculateNights()">

<div class="info">
Số đêm: <b id="nights">0</b>
</div>

<label>Số khách</label>
<input id="guests" type="number" placeholder="Ví dụ: 2">

<button onclick="submitBooking()">Kiểm tra phòng qua Zalo</button>

</div>
</div>

<script>

const ZALO_NUMBER="YOUR_ZALO_NUMBER"
const API_URL="YOUR_APPS_SCRIPT_URL"

function calculateNights(){

let checkin=document.getElementById("checkin").value
let checkout=document.getElementById("checkout").value

if(!checkin || !checkout) return

let d1=new Date(checkin)
let d2=new Date(checkout)

let diff=(d2-d1)/(1000*60*60*24)

if(diff>0){
document.getElementById("nights").innerText=diff
}else{
document.getElementById("nights").innerText=0
}

}

function submitBooking(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let checkin=document.getElementById("checkin").value
let checkout=document.getElementById("checkout").value
let guests=document.getElementById("guests").value
let nights=document.getElementById("nights").innerText

let error=document.getElementById("error")
error.innerHTML=""

if(!name||!phone||!checkin||!checkout||!guests){
error.innerHTML="Vui lòng điền đầy đủ thông tin"
return
}

let data={
name:name,
phone:phone,
checkin:checkin,
checkout:checkout,
nights:nights,
guests:guests
}

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})

let message=
"Xin chào Homestay, tôi muốn kiểm tra phòng:%0A%0A"+
"Tên: "+name+"%0A"+
"SĐT: "+phone+"%0A"+
"Checkin: "+checkin+"%0A"+
"Checkout: "+checkout+"%0A"+
"Số đêm: "+nights+"%0A"+
"Số khách: "+guests

let zaloLink="https://zalo.me/"+0365725659+"?text="+message

window.location.href=zaloLink

}

</script>

</body>
</html>
