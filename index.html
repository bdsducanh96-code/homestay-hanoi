<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đặt phòng Homestay Hà Nội</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:20px;
margin-top:40px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
font-size:22px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:18px;
background:#ff385c;
border:none;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#e11d48;
}

.result{
margin-top:15px;
font-weight:bold;
text-align:center;
}

</style>

</head>
<body>

<div class="container">

<h1>Đặt phòng Homestay Hà Nội</h1>

<form id="bookingForm">

<label>Tên khách</label>
<input type="text" id="ten" required>

<label>Ngày check-in</label>
<input type="date" id="checkin" required>

<label>Ngày check-out</label>
<input type="date" id="checkout" required>

<label>Số khách</label>
<select id="khach">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<div class="result" id="ketqua"></div>

<button type="submit">Kiểm tra phòng</button>

</form>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyKoQkT0Hdq_ixsYs03Ha1hr-nATncexSfDAn9mroSlVwZHBaEWNmdnMtAXMd_rmuPz/exec"; 

const zalo="0365725659";

const form=document.getElementById("bookingForm");

form.addEventListener("submit",function(e){

e.preventDefault();

let ten=document.getElementById("ten").value;

let checkin=document.getElementById("checkin").value;

let checkout=document.getElementById("checkout").value;

let khach=document.getElementById("khach").value;

let d1=new Date(checkin);

let d2=new Date(checkout);

let nights=(d2-d1)/(1000*60*60*24);

if(nights<=0){

alert("Checkout phải sau Checkin");

return;

}

document.getElementById("ketqua").innerText="Số đêm: "+nights;

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
ten:ten,
checkin:checkin,
checkout:checkout,
khach:khach,
dem:nights
})
});

let message=`Xin chào Homestay Hà Nội

Tên: ${ten}
Checkin: ${checkin}
Checkout: ${checkout}
Số khách: ${khach}
Số đêm: ${nights}`;

let url="https://zalo.me/"+zalo+"?text="+encodeURIComponent(message);

window.open(url,"_blank");

});

</script>

</body>
</html>
