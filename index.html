<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đặt phòng Homestay Hà Nội</title>

<style>

body{
font-family: Arial;
background:#f7f7f7;
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
margin-top:30px;
}

.card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
font-size:22px;
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
margin-top:20px;
padding:15px;
border:none;
border-radius:12px;
background:#ff385c;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:active{
transform:scale(0.98);
}

.result{
margin-top:15px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Đặt phòng Homestay Hà Nội</h1>

<form id="bookingForm">

<label>Tên khách</label>
<input type="text" id="ten" required>

<label>Check-in</label>
<input type="date" id="checkin" required>

<label>Check-out</label>
<input type="date" id="checkout" required>

<label>Số khách</label>

<select id="khach">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<div class="result" id="ketqua"></div>

<button type="submit">Kiểm tra phòng</button>

</form>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyKoQkT0Hdq_ixsYs03Ha1hr-nATncexSfDAn9mroSlVwZHBaEWNmdnMtAXMd_rmuPz/exec";

const zalo="0365725659";

const form=document.getElementById("bookingForm");

form.addEventListener("submit",function(e){

e.preventDefault();

let ten=document.getElementById("ten").value;

let checkin=document.getElementById("checkin").value;

let checkout=document.getElementById("checkout").value;

let khach=document.getElementById("khach").value;

let d1=new Date(checkin);
let d2=new Date(checkout);

let nights=(d2-d1)/(1000*60*60*24);

if(nights<=0){
alert("Ngày checkout phải sau checkin");
return;
}

document.getElementById("ketqua").innerText="Số đêm: "+nights;

fetch(API_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
ten:ten,
checkin:checkin,
checkout:checkout,
khach:khach,
dem:nights
})
});

let message=`Xin chào Homestay Hà Nội

Tên: ${ten}
Checkin: ${checkin}
Checkout: ${checkout}
Số khách: ${khach}
Số đêm: ${nights}`;

let url="https://zalo.me/"+zalo+"?msg="+encodeURIComponent(message);

window.location.href=url;

});

</script>

</body>

</html>
