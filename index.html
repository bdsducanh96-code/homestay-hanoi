<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Homestay Hà Nội</title>

<style>
body{
font-family:Arial;
max-width:500px;
margin:auto;
padding:40px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

button{
background:#0068ff;
color:white;
border:none;
}
</style>

</head>

<body>

<h1>🏡 Homestay Hà Nội</h1>
<p>Điền nhanh để kiểm tra phòng trống</p>

<input id="name" placeholder="Tên của bạn">

<input id="checkin" type="date">

<input id="guests" placeholder="Số khách">

<button onclick="sendZalo()">Kiểm tra phòng</button>

<script>

function sendZalo(){

let name=document.getElementById("name").value
let checkin=document.getElementById("checkin").value
let guests=document.getElementById("guests").value

let message=`Xin chào, tôi muốn kiểm tra phòng
Tên: ${name}
Checkin: ${checkin}
Số khách: ${guests}`

let zaloLink="https://zalo.me/0365725659?text="+encodeURIComponent(message)

window.location.href=zaloLink

}

</script>

</body>

</html>
