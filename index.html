<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homestay Hà Nội - Kiểm tra phòng</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f7fb;
}

.container{
  max-width:520px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:white;
  padding:28px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
  margin-top:0;
  font-size:26px;
}

.subtitle{
  color:#555;
  margin-bottom:20px;
}

label{
  font-size:14px;
  font-weight:600;
}

input{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:16px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
}

input:focus{
  outline:none;
  border-color:#0068ff;
}

button{
  width:100%;
  padding:14px;
  font-size:16px;
  font-weight:600;
  border:none;
  border-radius:10px;
  background:#0068ff;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#0052cc;
}

.note{
  margin-top:14px;
  font-size:13px;
  color:#777;
  text-align:center;
}

.error{
  color:#e53935;
  font-size:14px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🏡 Homestay Hà Nội</h1>
<p class="subtitle">Điền thông tin để kiểm tra phòng trống</p>

<div id="error" class="error"></div>

<label>Tên của bạn</label>
<input id="name" placeholder="Ví dụ: Nguyễn Minh">

<label>Ngày check-in</label>
<input id="checkin" type="date">

<label>Số khách</label>
<input id="guests" type="number" placeholder="Ví dụ: 2">

<button onclick="sendZalo()">Kiểm tra phòng</button>

<p class="note">
Sau khi bấm nút, Zalo sẽ mở để gửi thông tin cho homestay.
</p>

</div>
</div>

<script>

function sendZalo(){

let name = document.getElementById("name").value.trim()
let checkin = document.getElementById("checkin").value
let guests = document.getElementById("guests").value

let error = document.getElementById("error")
error.innerHTML=""

if(!name || !checkin || !guests){
  error.innerHTML="Vui lòng điền đầy đủ thông tin."
  return
}

let message =
"Xin chào Homestay, tôi muốn kiểm tra phòng:%0A%0A" +
"Tên: " + name + "%0A" +
"Checkin: " + checkin + "%0A" +
"Số khách: " + guests

let zaloLink =
"https://zalo.me/0365725659?text=" + message

window.location.href = zaloLink

}

</script>

</body>
</html>
